<!doctype html>
<!-- @dsCard group="Components" name="Buttons" subtitle="Primary · Secondary · Tertiary · Destructive" viewport="700x180" --><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
<div class="label">Buttons — 4 levels · one primary per view</div>
<div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-top:4px">
<button style="background:#1B2A3A;color:#fff;border:0;padding:8px 16px;border-radius:4px;font-family:Inter;font-size:13px;font-weight:600;cursor:pointer">Submit for approval</button>
<button style="background:#fff;color:#1A1A1A;border:1px solid #D8D4CA;padding:8px 16px;border-radius:4px;font-family:Inter;font-size:13px;font-weight:500;cursor:pointer">Save draft</button>
<button style="background:none;color:#2E4A6B;border:0;padding:8px 8px;font-family:Inter;font-size:13px;font-weight:500;cursor:pointer">View details →</button>
<button style="background:#fff;color:#9A2F2F;border:1px solid #D8D4CA;padding:8px 16px;border-radius:4px;font-family:Inter;font-size:13px;font-weight:500;cursor:pointer">Reverse entry</button>
</div>
<div style="display:flex;gap:10px;align-items:center;margin-top:12px">
<button style="background:#1B2A3A;color:#fff;border:0;padding:8px 16px;border-radius:4px;font-family:Inter;font-size:13px;font-weight:600;outline:2px solid #B4442C;outline-offset:2px">Focused (keyboard)</button>
<button disabled style="background:#F4F1E9;color:#8A8A8A;border:1px solid #D8D4CA;padding:8px 16px;border-radius:4px;font-family:Inter;font-size:13px;font-weight:500">Disabled · still readable</button>
</div>
<div class="hex" style="margin-top:10px">primary · secondary · tertiary · destructive  —  red is a meaning, not a weight</div>
</div></body></html>
