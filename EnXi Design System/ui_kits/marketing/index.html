<!doctype html>
<!-- @dsCard group="UI Kit — Marketing" name="Marketing UI Kit — Website" subtitle="Homepage hero · case study · Not-for page" viewport="1440x1100" -->
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>EnXi — Marketing site UI kit</title>
<link rel="stylesheet" href="marketing.css"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Source+Serif+4:ital,wght@0,400;0,600;1,400&family=DM+Serif+Display&display=swap"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="Pages.jsx"></script>
<script type="text/babel">
const { useState } = React;
function App() {
  const [page, setPage] = useState(localStorage.getItem('enxi-mkt-page') || 'home');
  const go = (p) => { setPage(p); localStorage.setItem('enxi-mkt-page', p); };
  return (
    <>
      <SiteHeader page={page} setPage={go}/>
      {page === 'home' && <Home setPage={go}/>}
      {page === 'case' && <CaseStudy/>}
      {page === 'notfor' && <NotFor setPage={go}/>}
      <SiteFooter/>
    </>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
