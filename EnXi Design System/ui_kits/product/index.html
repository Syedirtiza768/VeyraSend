<!doctype html>
<!-- @dsCard group="UI Kit — Product" name="Product UI Kit — ERP" subtitle="Controller's dashboard · PO · Variance" viewport="1440x900" -->
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=1440"/>
<title>EnXi — ERP product UI kit</title>
<link rel="stylesheet" href="product.css"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Source+Serif+4:ital,wght@0,400;0,600;1,400&family=DM+Serif+Display&display=swap"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="Shell.jsx"></script>
<script type="text/babel" src="DashboardPage.jsx"></script>
<script type="text/babel" src="POPage.jsx"></script>
<script type="text/babel" src="VariancePage.jsx"></script>
<script type="text/babel">
const { useState } = React;
function App() {
  const [page, setPage] = useState(localStorage.getItem('enxi-page') || 'dashboard');
  const [toast, setToast] = useState(null);
  const go = (p) => { setPage(p); localStorage.setItem('enxi-page', p); };
  return (
    <Shell page={page} setPage={go} toast={toast} setToast={setToast}>
      {page === 'dashboard' && <DashboardPage setPage={go}/>}
      {page === 'po' && <POPage setPage={go} setToast={setToast}/>}
      {page === 'variance' && <VariancePage/>}
      {(page !== 'dashboard' && page !== 'po' && page !== 'variance') && <>
        <div className="page-h"><h1>{page}</h1></div>
        <div className="panel">
          <p style={{fontSize:14, color:'var(--enxi-color-ink-70)', margin:0}}>
            This surface is not part of the kit's recreated scope. See <a href="#" onClick={(e) => { e.preventDefault(); go('dashboard'); }} style={{color:'var(--enxi-color-indigo-600)'}}>Overview</a>, <a href="#" onClick={(e) => { e.preventDefault(); go('po'); }} style={{color:'var(--enxi-color-indigo-600)'}}>Purchase orders</a>, or <a href="#" onClick={(e) => { e.preventDefault(); go('variance'); }} style={{color:'var(--enxi-color-indigo-600)'}}>Variance analysis</a>.
          </p>
        </div>
      </>}
    </Shell>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
